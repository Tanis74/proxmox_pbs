---
- name: Converge
  hosts: all
  gather_facts: true
  pre_tasks:
    - name: "Fix DNS for test VM"
      ansible.builtin.command: "resolvectl dns eth0 8.8.8.8"
      become: true
      changed_when: false

    - name: "Ensure gpg is installed (prerequisite)"
      ansible.builtin.apt:
        name: gpg
        state: present
        update_cache: true
      become: true

  tasks:
    - name: "Apply proxmox_pbs role"
      ansible.builtin.include_role:
        name: devops.platform.proxmox_pbs
      vars:
        # Test VM specifics — no real second disk but /dev/sdb exists
        proxmox_pbs_version: ""
        proxmox_pbs_hostname: "pbs-test"
        proxmox_pbs_domain: "test.local"
        proxmox_pbs_configure_hosts: false
        proxmox_pbs_configure_debian_repos: true
        proxmox_pbs_datastore_device: "/dev/sdb"
        proxmox_pbs_datastore_path: "/mnt/pbs-datastore"
        proxmox_pbs_swap_size_mb: 512
        proxmox_pbs_swap_path: "/swapfile"
        proxmox_pbs_verify_gpg: false
        proxmox_pbs_configure_firewall: false
        proxmox_pbs_sync_enabled: false
