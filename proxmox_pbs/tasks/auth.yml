---
# PBS user and API token management (PBS 4.x API).
# Creates two users with least-privilege separation:
#   - backup@pbs  → DatastorePowerUser (Datastore.Backup + Datastore.Prune)
#   - monitor@pbs → Audit (Sys.Audit + Datastore.Audit)
#
# Token secrets are displayed ONCE via debug. The operator must save them to SOPS
# manually (matches the existing project pattern for Timeweb/Proxmox tokens).

- name: "auth | Generate random passwords for PBS users"
  ansible.builtin.set_fact:
    __pbs_backup_password: "{{ lookup('ansible.builtin.password', '/dev/null', length=32, chars=['ascii_letters', 'digits']) }}"
    __pbs_monitor_password: "{{ lookup('ansible.builtin.password', '/dev/null', length=32, chars=['ascii_letters', 'digits']) }}"
  no_log: true

# --- User existence check ---

- name: "auth | Get user list"
  ansible.builtin.command: "proxmox-backup-manager user list --output-format json"
  register: __pbs_user_list
  changed_when: false
  become: true

- name: "auth | Parse user IDs"
  ansible.builtin.set_fact:
    __pbs_users: "{{ __pbs_user_list.stdout | from_json | map(attribute='userid') | list }}"

# --- Token existence check (use user list-tokens, not user list) ---
# NOTE: user list-tokens returns 'token-name' (just the name), not 'tokenid' (userid!name)

- name: "auth | Check backup tokens"
  ansible.builtin.command: "proxmox-backup-manager user list-tokens {{ proxmox_pbs_backup_user }} --output-format json"
  register: __pbs_backup_tokens_raw
  changed_when: false
  become: true
  failed_when: false
  when: proxmox_pbs_backup_user in __pbs_users

- name: "auth | Parse backup token existence"
  ansible.builtin.set_fact:
    __pbs_backup_token_exists: "{{
      (__pbs_backup_tokens_raw.stdout | from_json | map(attribute='token-name') | list | default([]))
      | select('eq', proxmox_pbs_backup_token_name) | list | length > 0
    }}"
  when:
    - proxmox_pbs_backup_user in __pbs_users
    - __pbs_backup_tokens_raw.rc | default(0) == 0

- name: "auth | Check monitor tokens"
  ansible.builtin.command: "proxmox-backup-manager user list-tokens {{ proxmox_pbs_monitor_user }} --output-format json"
  register: __pbs_monitor_tokens_raw
  changed_when: false
  become: true
  failed_when: false
  when: proxmox_pbs_monitor_user in __pbs_users

- name: "auth | Parse monitor token existence"
  ansible.builtin.set_fact:
    __pbs_monitor_token_exists: "{{
      (__pbs_monitor_tokens_raw.stdout | from_json | map(attribute='token-name') | list | default([]))
      | select('eq', proxmox_pbs_monitor_token_name) | list | length > 0
    }}"
  when:
    - proxmox_pbs_monitor_user in __pbs_users
    - __pbs_monitor_tokens_raw.rc | default(0) == 0

# --- Backup user ---

- name: "auth | Force — delete existing backup token for rotation"
  ansible.builtin.command: >
    proxmox-backup-manager user delete-token
    {{ proxmox_pbs_backup_user }}
    {{ proxmox_pbs_backup_token_name }}
  become: true
  changed_when: true
  failed_when: false
  when:
    - proxmox_pbs_force_token | bool
    - __pbs_backup_token_exists | default(false) | bool

- name: "auth | Reset backup token existence after forced delete"
  ansible.builtin.set_fact:
    __pbs_backup_token_exists: false
  when:
    - proxmox_pbs_force_token | bool
    - __pbs_backup_token_exists | default(false) | bool

- name: "auth | Force — delete existing monitor token for rotation"
  ansible.builtin.command: >
    proxmox-backup-manager user delete-token
    {{ proxmox_pbs_monitor_user }}
    {{ proxmox_pbs_monitor_token_name }}
  become: true
  changed_when: true
  failed_when: false
  when:
    - proxmox_pbs_force_token | bool
    - __pbs_monitor_token_exists | default(false) | bool

- name: "auth | Reset monitor token existence after forced delete"
  ansible.builtin.set_fact:
    __pbs_monitor_token_exists: false
  when:
    - proxmox_pbs_force_token | bool
    - __pbs_monitor_token_exists | default(false) | bool

- name: "auth | Create backup user"
  ansible.builtin.command: >
    proxmox-backup-manager user create {{ proxmox_pbs_backup_user }}
    --password {{ __pbs_backup_password }}
  become: true
  changed_when: true
  no_log: true
  when: proxmox_pbs_backup_user not in __pbs_users

- name: "auth | Create backup API token"
  ansible.builtin.command: >
    proxmox-backup-manager user generate-token
    {{ proxmox_pbs_backup_user }}
    {{ proxmox_pbs_backup_token_name }}
    --comment "{{ proxmox_pbs_backup_token_comment }}"
  register: __pbs_backup_token_raw
  become: true
  changed_when: true
  no_log: true
  when: not __pbs_backup_token_exists | default(false) | bool

- name: "auth | Parse backup token secret"
  ansible.builtin.set_fact:
    __pbs_backup_token_secret: "{{
      (__pbs_backup_token_raw.stdout | regex_replace('^Result:\\s*', '') | trim | from_json)['value']
    }}"
  when:
    - __pbs_backup_token_raw.changed | default(false) | bool
  no_log: true

- name: "auth | Assert backup token secret is not empty"
  ansible.builtin.assert:
    that: __pbs_backup_token_secret | length > 0
    fail_msg: "Failed to extract backup token secret from PBS output. PBS output format may have changed."
  when:
    - __pbs_backup_token_raw.changed | default(false) | bool

- name: "auth | Check current backup ACL"
  ansible.builtin.command: "proxmox-backup-manager acl list --output-format json"
  register: __pbs_acl_list
  changed_when: false
  become: true

# Token permissions in PBS 4.x are the INTERSECTION of token ACLs and user ACLs.
# Both must have the same permissions for the token to be effective.
# See: https://pbs.proxmox.com/docs/user-management.html#api-tokens

- name: "auth | Set backup USER ACL / (required for token intersection)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Audit
    --auth-id {{ proxmox_pbs_backup_user }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_backup_user)
    | selectattr('roleid', 'eq', 'Audit')
    | selectattr('path', 'eq', '/')
    | list | length == 0

- name: "auth | Set backup USER ACL /datastore (required for token intersection)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update
    /datastore
    DatastoreAudit
    --auth-id {{ proxmox_pbs_backup_user }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_backup_user)
    | selectattr('roleid', 'eq', 'DatastoreAudit')
    | selectattr('path', 'eq', '/datastore')
    | list | length == 0

- name: "auth | Set backup USER ACL /datastore/<name> (required for token intersection)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update
    /datastore/{{ proxmox_pbs_datastore_name }}
    DatastoreBackup
    --auth-id {{ proxmox_pbs_backup_user }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_backup_user)
    | selectattr('roleid', 'eq', 'DatastoreBackup')
    | selectattr('path', 'eq', '/datastore/' + proxmox_pbs_datastore_name)
    | list | length == 0

- name: "auth | Set backup token ACL / (required for token intersection)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Audit
    --auth-id {{ proxmox_pbs_backup_user }}!{{ proxmox_pbs_backup_token_name }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_backup_user + '!' + proxmox_pbs_backup_token_name)
    | selectattr('roleid', 'eq', 'Audit')
    | selectattr('path', 'eq', '/')
    | list | length == 0

- name: "auth | Set backup token ACL /datastore (needed for pvesm discovery)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update
    /datastore
    DatastoreAudit
    --auth-id {{ proxmox_pbs_backup_user }}!{{ proxmox_pbs_backup_token_name }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_backup_user + '!' + proxmox_pbs_backup_token_name)
    | selectattr('roleid', 'eq', 'DatastoreAudit')
    | selectattr('path', 'eq', '/datastore')
    | list | length == 0

- name: "auth | Set backup token ACL /datastore/<name> (DatastoreBackup)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update
    /datastore/{{ proxmox_pbs_datastore_name }}
    DatastoreBackup
    --auth-id {{ proxmox_pbs_backup_user }}!{{ proxmox_pbs_backup_token_name }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_backup_user + '!' + proxmox_pbs_backup_token_name)
    | selectattr('roleid', 'eq', 'DatastoreBackup')
    | selectattr('path', 'eq', '/datastore/' + proxmox_pbs_datastore_name)
    | list | length == 0

# --- Monitor user ---

- name: "auth | Create monitor user"
  ansible.builtin.command: >
    proxmox-backup-manager user create {{ proxmox_pbs_monitor_user }}
    --password {{ __pbs_monitor_password }}
  become: true
  changed_when: true
  no_log: true
  when: proxmox_pbs_monitor_user not in __pbs_users

- name: "auth | Create monitor API token"
  ansible.builtin.command: >
    proxmox-backup-manager user generate-token
    {{ proxmox_pbs_monitor_user }}
    {{ proxmox_pbs_monitor_token_name }}
    --comment "{{ proxmox_pbs_monitor_token_comment }}"
  register: __pbs_monitor_token_raw
  become: true
  changed_when: true
  no_log: true
  when: not __pbs_monitor_token_exists | default(false) | bool

- name: "auth | Parse monitor token secret"
  ansible.builtin.set_fact:
    __pbs_monitor_token_secret: "{{
      (__pbs_monitor_token_raw.stdout | regex_replace('^Result:\\s*', '') | trim | from_json)['value']
    }}"
  when:
    - __pbs_monitor_token_raw.changed | default(false) | bool
  no_log: true

- name: "auth | Assert monitor token secret is not empty"
  ansible.builtin.assert:
    that: __pbs_monitor_token_secret | length > 0
    fail_msg: "Failed to extract monitor token secret from PBS output. PBS output format may have changed."
  when:
    - __pbs_monitor_token_raw.changed | default(false) | bool

- name: "auth | Check current monitor ACL"
  ansible.builtin.command: "proxmox-backup-manager acl list --output-format json"
  register: __pbs_acl_list_monitor
  changed_when: false
  become: true

- name: "auth | Set monitor USER ACL / (required for token intersection)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update /
    Audit
    --auth-id {{ proxmox_pbs_monitor_user }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list_monitor.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_monitor_user)
    | selectattr('roleid', 'eq', 'Audit')
    | selectattr('path', 'eq', '/')
    | list | length == 0

- name: "auth | Set monitor token ACL / (required for token intersection)"
  ansible.builtin.command: >
    proxmox-backup-manager acl update
    /
    Audit
    --auth-id {{ proxmox_pbs_monitor_user }}!{{ proxmox_pbs_monitor_token_name }}
  become: true
  changed_when: true
  when: >
    __pbs_acl_list_monitor.stdout | from_json
    | selectattr('ugid', 'eq', proxmox_pbs_monitor_user + '!' + proxmox_pbs_monitor_token_name)
    | selectattr('roleid', 'eq', 'Audit')
    | selectattr('path', 'eq', '/')
    | list | length == 0

# --- Certificate fingerprint (needed for pvesm add on Proxmox VE) ---

- name: "auth | Get PBS certificate fingerprint"
  ansible.builtin.command: "proxmox-backup-manager cert info"
  register: __pbs_cert_info_raw
  changed_when: false
  become: true

- name: "auth | Extract PBS certificate fingerprint"
  ansible.builtin.set_fact:
    __pbs_fingerprint: "{{ __pbs_cert_info_raw.stdout | regex_search('Fingerprint.*: ([A-Fa-f0-9:]+)', '\\1') | first | trim }}"

- name: "auth | Display certificate fingerprint"
  ansible.builtin.debug:
    msg: >
      PBS certificate fingerprint: {{ __pbs_fingerprint }}

# --- Token secret output / auto-save ---
# If auto_save_token is enabled, encrypt secrets directly to SOPS without console output.
# Otherwise display them for manual save.

- name: "auth | Gather both token secrets for SOPS payload"
  ansible.builtin.set_fact:
    __pbs_sops_backup_secret: "{{ __pbs_backup_token_secret | default('') }}"
    __pbs_sops_monitor_secret: "{{ __pbs_monitor_token_secret | default('') }}"
  no_log: true
  when:
    - proxmox_pbs_auto_save_token | bool
    - __pbs_backup_token_raw.changed | default(false) | bool
      or __pbs_monitor_token_raw.changed | default(false) | bool

- name: "auth | Auto-save — create temp file and encrypt to SOPS"
  block:
    - name: "auth | Auto-save — create temp file"
      ansible.builtin.tempfile:
        state: file
        suffix: ".sops.yml"
      register: __pbs_sops_tmpfile
      delegate_to: localhost

    - name: "auth | Auto-save — write secrets to temp file"
      ansible.builtin.copy:
        content: |
          # PBS API tokens — auto-saved by proxmox_pbs role
          pbs_backup_token_secret: "{{ __pbs_sops_backup_secret }}"
          pbs_monitor_token_secret: "{{ __pbs_sops_monitor_secret }}"
        dest: "{{ __pbs_sops_tmpfile.path }}"
        mode: "0600"
      delegate_to: localhost
      no_log: true

    - name: "auth | Auto-save — encrypt to SOPS file"
      ansible.builtin.command: >
        sops --encrypt --age {{ proxmox_pbs_sops_age_public_key }}
        {{ __pbs_sops_tmpfile.path }}
      register: __pbs_sops_encrypted
      delegate_to: localhost
      changed_when: true
      no_log: true

    - name: "auth | Auto-save — write encrypted result"
      ansible.builtin.copy:
        content: "{{ __pbs_sops_encrypted.stdout }}"
        dest: "{{ proxmox_pbs_token_sops_file }}"
        mode: "0600"
      delegate_to: localhost
      no_log: true
  always:
    - name: "auth | Auto-save — guaranteed temp file cleanup"
      ansible.builtin.file:
        path: "{{ __pbs_sops_tmpfile.path | default('') }}"
        state: absent
      delegate_to: localhost
      when: __pbs_sops_tmpfile is defined and __pbs_sops_tmpfile.path | default('') != ''
      failed_when: false
  when:
    - proxmox_pbs_auto_save_token | bool
    - __pbs_backup_token_raw.changed | default(false) | bool
      or __pbs_monitor_token_raw.changed | default(false) | bool

- name: "auth | Auto-save — silent confirmation"
  ansible.builtin.debug:
    msg: >
      PBS tokens {{ 'created and' if __pbs_backup_token_raw.changed | default(false) or __pbs_monitor_token_raw.changed | default(false) else '' }}
      saved to {{ proxmox_pbs_token_sops_file }} (auto-save).
  when:
    - proxmox_pbs_auto_save_token | bool
    - __pbs_backup_token_raw.changed | default(false) | bool
      or __pbs_monitor_token_raw.changed | default(false) | bool

- name: "auth | Display backup token secret (manual save mode)"
  ansible.builtin.debug:
    msg: >
      ========================================
      BACKUP TOKEN CREATED ({{ proxmox_pbs_backup_user }}!{{ proxmox_pbs_backup_token_name }})
      Secret: {{ __pbs_backup_token_secret | default('(token already exists — secret not available)') }}
      ========================================
      Save immediately to SOPS:
        sops --encrypt --age <age-public-key> {{ proxmox_pbs_token_sops_file }}
      This secret CANNOT be retrieved later. If lost:
        proxmox-backup-manager user delete-token {{ proxmox_pbs_backup_user }} {{ proxmox_pbs_backup_token_name }}
        Then re-run this role.
      ========================================
  when:
    - proxmox_pbs_store_token_in_sops | bool
    - not (proxmox_pbs_auto_save_token | bool)
    - __pbs_backup_token_raw.changed | default(false) | bool

- name: "auth | Display monitor token secret (manual save mode)"
  ansible.builtin.debug:
    msg: >
      ========================================
      MONITOR TOKEN CREATED ({{ proxmox_pbs_monitor_user }}!{{ proxmox_pbs_monitor_token_name }})
      Secret: {{ __pbs_monitor_token_secret | default('(token already exists — secret not available)') }}
      ========================================
      Save immediately to SOPS alongside the backup token:
        sops --encrypt --age <age-public-key> {{ proxmox_pbs_token_sops_file }}
      This secret CANNOT be retrieved later. If lost:
        proxmox-backup-manager user delete-token {{ proxmox_pbs_monitor_user }} {{ proxmox_pbs_monitor_token_name }}
        Then re-run this role.
      ========================================
  when:
    - proxmox_pbs_store_token_in_sops | bool
    - not (proxmox_pbs_auto_save_token | bool)
    - __pbs_monitor_token_raw.changed | default(false) | bool

- name: "auth | Token storage reminder"
  ansible.builtin.debug:
    msg: >
      Both PBS tokens already exist — no new tokens were created.
      If you have lost the secrets, re-run this role with proxmox_pbs_force_token=true
      to rotate tokens, or delete them manually:
        proxmox-backup-manager user delete-token {{ proxmox_pbs_backup_user }} {{ proxmox_pbs_backup_token_name }}
        proxmox-backup-manager user delete-token {{ proxmox_pbs_monitor_user }} {{ proxmox_pbs_monitor_token_name }}
  when:
    - proxmox_pbs_store_token_in_sops | bool
    - not (proxmox_pbs_auto_save_token | bool)
    - not (__pbs_backup_token_raw.changed | default(false) | bool)
    - not (__pbs_monitor_token_raw.changed | default(false) | bool)
