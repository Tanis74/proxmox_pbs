---
- name: "Restart proxmox-backup"
  ansible.builtin.systemd_service:
    name: proxmox-backup
    state: restarted
    daemon_reload: true
  become: true

- name: "Restart proxmox-backup-proxy"
  ansible.builtin.systemd_service:
    name: proxmox-backup-proxy
    state: restarted
    daemon_reload: true
  become: true

- name: "Reload proxmox-backup-proxy"
  ansible.builtin.systemd_service:
    name: proxmox-backup-proxy
    state: reloaded
  become: true
