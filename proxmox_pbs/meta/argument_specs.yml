---
argument_specs:
  main:
    short_description: "Install and configure Proxmox Backup Server on Debian"
    options:
      proxmox_pbs_version:
        description: "Pinned PBS package version. Set to '' to accept latest from repo."
        type: "str"
        default: "4.2.2-1"
      proxmox_pbs_repo_type:
        description: "PBS repository type"
        type: "str"
        default: "no-subscription"
        choices:
          - "no-subscription"
          - "enterprise"
      proxmox_pbs_verify_gpg:
        description: "Verify GPG key checksums after download"
        type: "bool"
        default: true
      proxmox_pbs_configure_debian_repos:
        description: "Configure Debian base repositories"
        type: "bool"
        default: false
      proxmox_pbs_remove_enterprise:
        description: "Remove enterprise repo file if present"
        type: "bool"
        default: true
      proxmox_pbs_hostname:
        description: "Short hostname"
        type: "str"
        default: "pbs"
      proxmox_pbs_domain:
        description: "DNS domain"
        type: "str"
        default: "lan.infracode.cz"
      proxmox_pbs_configure_hosts:
        description: "Configure /etc/hosts"
        type: "bool"
        default: true
      proxmox_pbs_ip:
        description: "Static IP address"
        type: "str"
        default: "10.10.10.201"
      proxmox_pbs_swap_size_mb:
        description: "Swap file size in MB (0 = skip creation)"
        type: "int"
        default: 2048
      proxmox_pbs_swap_path:
        description: "Path to swap file"
        type: "str"
        default: "/swapfile"
      proxmox_pbs_datastore_name:
        description: "PBS datastore name"
        type: "str"
        default: "pbs-datastore"
      proxmox_pbs_datastore_path:
        description: "Mount point for datastore disk"
        type: "str"
        default: "/mnt/pbs-datastore"
      proxmox_pbs_datastore_fstype:
        description: "Filesystem type for datastore disk"
        type: "str"
        default: "ext4"
      proxmox_pbs_datastore_mount_opts:
        description: "Mount options for datastore disk"
        type: "str"
        default: "defaults,noatime"
      proxmox_pbs_manage_datastore_disk:
        description: "Format and mount a dedicated disk for datastore"
        type: "bool"
        default: true
      proxmox_pbs_datastore_device:
        description: "Block device for datastore (empty = auto-discover)"
        type: "str"
        default: ""
      proxmox_pbs_prune_schedule:
        description: "Prune schedule in PBS calendar event syntax"
        type: "str"
        default: "daily 03:00"
      proxmox_pbs_gc_schedule:
        description: "Garbage collection schedule in PBS calendar event syntax"
        type: "str"
        default: "daily 04:00"
      proxmox_pbs_verify_schedule:
        description: "Verification schedule in PBS calendar event syntax"
        type: "str"
        default: "sun 05:00"
      proxmox_pbs_keep_daily:
        description: "Number of daily backups to keep"
        type: "int"
        default: 7
      proxmox_pbs_keep_weekly:
        description: "Number of weekly backups to keep"
        type: "int"
        default: 4
      proxmox_pbs_keep_monthly:
        description: "Number of monthly backups to keep"
        type: "int"
        default: 3
      proxmox_pbs_keep_yearly:
        description: "Number of yearly backups to keep. 0 = omit flag (no yearly retention)."
        type: "int"
        default: 0
      proxmox_pbs_backup_user:
        description: "PBS user for Proxmox VE backup operations"
        type: "str"
        default: "backup@pbs"
      proxmox_pbs_backup_token_name:
        description: "API token ID for backup user"
        type: "str"
        default: "pve-backup"
      proxmox_pbs_backup_token_comment:
        description: "Comment for backup API token"
        type: "str"
        default: "Proxmox VE backup access"
      proxmox_pbs_monitor_user:
        description: "PBS user for monitoring (read-only)"
        type: "str"
        default: "monitor@pbs"
      proxmox_pbs_monitor_token_name:
        description: "API token ID for monitoring user"
        type: "str"
        default: "alloy-metrics"
      proxmox_pbs_monitor_token_comment:
        description: "Comment for monitoring API token"
        type: "str"
        default: "Alloy PBS metrics scraping"
      proxmox_pbs_store_token_in_sops:
        description: "Remind operator to store token in SOPS"
        type: "bool"
        default: true
      proxmox_pbs_token_sops_file:
        description: "Path to SOPS file for PBS tokens"
        type: "str"
        default: "{{ inventory_dir }}/group_vars/pbs.sops.yml"
      proxmox_pbs_sync_enabled:
        description: "Create PBS Sync Job for offsite USB HDD"
        type: "bool"
        default: false
      proxmox_pbs_sync_remote_path:
        description: "Remote path for sync job (USB HDD mount point)"
        type: "str"
        default: "/mnt/usb-backup"
      proxmox_pbs_sync_schedule:
        description: "Sync job schedule in PBS calendar event syntax"
        type: "str"
        default: "mon 02:00"
      proxmox_pbs_sync_keep_daily:
        description: "Daily sync snapshots to keep"
        type: "int"
        default: 7
      proxmox_pbs_sync_keep_weekly:
        description: "Weekly sync snapshots to keep"
        type: "int"
        default: 4
      proxmox_pbs_sync_keep_monthly:
        description: "Monthly sync snapshots to keep"
        type: "int"
        default: 3
      # Firewall is managed by the sec_nft role.
