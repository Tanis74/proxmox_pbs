---
# PBS connection — override in inventory if needed
proxmox_pve_backup_pbs_server: "10.10.10.201"
proxmox_pve_backup_pbs_datastore: "pbs-datastore"
proxmox_pve_backup_pbs_username: "backup@pbs!pve-backup"
# Fingerprint is environment-specific — set in group_vars/proxmox.yml
proxmox_pve_backup_pbs_fingerprint: ""

# VZDump schedule (systemd calendar event format)
proxmox_pve_backup_schedule: "*-*-* 02:00"
proxmox_pve_backup_all: true
proxmox_pve_backup_compress: "zstd"

# Retention (prune-backups)
proxmox_pve_backup_prune_daily: 7
proxmox_pve_backup_prune_weekly: 4
proxmox_pve_backup_prune_monthly: 3

# Notification mode (auto = use notification system if mailto not set)
proxmox_pve_backup_notification_mode: "auto"
